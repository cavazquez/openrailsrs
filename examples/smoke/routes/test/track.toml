[route]
id = "test"

[[nodes]]
id = "yard_a"
x_m = 0.0
y_m = 0.0

[[nodes]]
id = "mid"
x_m = 5000.0
y_m = 50.0

# Switch node: straight goes to yard_b, diverging goes to siding_c.
# Default is straight so the smoke scenario reaches yard_b unchanged.
[[nodes]]
id = "junction"
x_m = 7500.0
y_m = 25.0
kind = { switch = { stem_edge = "e3", diverging_edge = "e4", default_position = "straight" } }

[[nodes]]
id = "yard_b"
x_m = 10000.0
y_m = 0.0

# Diverging destination — used by switch tests.
[[nodes]]
id = "siding_c"
x_m = 7500.0
y_m = -500.0

[[edges]]
id = "e1"
from = "yard_a"
to = "mid"
length_m = 5000.0
speed_limit_kmh = 80.0
grade_percent = 1.0

[[edges]]
id = "e2"
from = "mid"
to = "junction"
length_m = 2500.0
speed_limit_kmh = 80.0
grade_percent = -0.5

# Straight branch of the switch — leads to yard_b.
[[edges]]
id = "e3"
from = "junction"
to = "yard_b"
length_m = 2500.0
speed_limit_kmh = 80.0
grade_percent = -0.5

# Diverging branch of the switch — leads to siding_c.
[[edges]]
id = "e4"
from = "junction"
to = "siding_c"
length_m = 500.0
speed_limit_kmh = 40.0
grade_percent = 0.0

# Caution signal at entry of e1 — reduces effective speed limit to 40 km/h.
[[signals]]
id = "sig_e1_caution"
edge_id = "e1"
position_m = 0.0
aspect = "caution"
