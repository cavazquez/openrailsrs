# Escenario de prueba — Tracción vapor (Fase 24)
#
# Locomotora 2-8-0 "Consolidation" recorre 50 km en el ramal Pampa.
# El CSV de salida incluye columnas extra: boiler_pressure_bar, water_kg, coal_kg.
#
# Ejecutar:
#   openrailsrs sim examples/steam/scenario.toml

[scenario]
name = "Vapor: km0 → km50"
description = "Prueba de tracción a vapor con modelo termodinámico de caldera"

[route]
path = "routes/pampas"
start = "km0"
destination = "km50"

[[route.stops]]
node = "km25"
arrive_s = 1400.0
depart_s = 1500.0
dwell_s  = 60.0

[train]
consist = "consists/steam.con"

[gameplay]
objective = "arrive_on_time"
difficulty = "normal"
penalty_per_second_late = 1.0

[simulation]
duration  = 4500.0   # 75 minutos sim-time
time_step = 1.0

[output]
csv      = "run.csv"
metadata = "run.json"
