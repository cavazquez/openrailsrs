# Merged automatically after `import-msts` (route/placement come from the .act).
# Edit this file instead of hand-fixing scenario.toml after each re-import.

[simulation]
duration = 65.0

[route]
# OR evaluation baseline uses AUTO_SIGNAL with CLEAR aspects; imported TDB defaults to Stop.
# Applied at sim runtime via scenario.overlay.toml (OR-P7: replace with real signal scripts).
assume_signals_clear = true

# OR MAXSPEED drops to ~50 mph beyond ~1490 m (start of e10777 on Birmingham path).
[[route.edge_speed_limits]]
edge = "e10777"
speed_limit_kmh = 80.467

[[route.edge_speed_limits]]
edge = "e10775"
speed_limit_kmh = 80.467

[[route.edge_speed_limits]]
edge = "e10773"
speed_limit_kmh = 80.467

[[route.edge_speed_limits]]
edge = "e10771"
speed_limit_kmh = 80.467

# Stops from the old n3→n10770 corridor are invalid after TrackPDP world spawn
# (train now starts on Paddington platform track near PAT start). Re-add when the
# directed graph can follow the full Birmingham PAT outbound.

[gameplay]
objective = "arrive_on_time"
penalty_per_second_late = 8.0

[train]
consist = "consists/birmingham_pullman.con"

[viewer3d.world_anchor]
# PAT TrackPDP start (Paddington platform area) — matches live-drive spawn.
# TrackPDP ( -6079 14925 -961.337 28.558 -71.912 1 0 )
tile_x = -6079
tile_z = 14925
local_x_m = -961.337
local_y_m = 28.558
local_z_m = -71.912

# Uncomment to hide terrain/shapes and draw continuous track from .tdb (not TrackObj):
# [viewer3d]
# scenery_mode = "track_dev"

# Viewing / tile-stream distance (metres). Default 2000 ≈ one MSTS tile.
# CLI: --viewing-distance 1000
# [viewer3d]
# viewing_distance_m = 2000

[validate]
baseline_or = "../baselines/chiltern_birmingham/or_evaluation_speed.csv"
max_velocity_rms = 4.5
max_position_max = 55.0
max_throttle_rms = 0.25
max_brake_rms = 50.0
phase_bounds = [0.0, 61.0, 136.0]
phase_max_velocity_rms = 0.55
