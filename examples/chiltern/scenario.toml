extra_trains = []

[scenario]
name = "RS_Let's go to Birmingham"
description = "Imported from MSTS activity: /home/cristian/Documentos/Open Rails/Content/Chiltern/ROUTES/Chiltern/ACTIVITIES/RS_Let's go to Birmingham.act"

[route]
path = "."
start = "n3"
destination = "n10770"
start_offset_m = 305.576
assume_signals_clear = true
stops = []

[[route.switches]]
node = "n10770"
position = "diverging"

[[route.switches]]
node = "n10780"
position = "straight"

[train]
consist = "consists/birmingham_pullman.con"

[train.davis]
# Effective resistance calibrated vs OR (legacy aggregate included default seed).
a_n = 3088.0
b_n_per_mps = 159.0
c_n_per_mps2 = 9.1

[gameplay]
objective = "arrive"
difficulty = "normal"
penalty_per_second_late = 0.0

[simulation]
duration = 136.0
time_step = 1.0
seed = 42
# OR driver CSV uses PSI/121; Westinghouse cylinder force calibrated at 35 PSI (Chiltern).
brake_cylinder_full_scale_psi = 35.0

[output]
csv = "run.csv"
metadata = "run.json"

[validate]
baseline_or = "../baselines/chiltern_birmingham/or_evaluation_speed.csv"
# Baseline OR ~136 s sim (10:00→10:02:16); cap P/v por locomotora
max_velocity_rms = 0.30
max_position_max = 45.0
max_throttle_rms = 0.25
max_brake_rms = 0.25
phase_bounds = [0.0, 30.0, 61.0, 136.0]
phase_max_velocity_rms = 0.35
