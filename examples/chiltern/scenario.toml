[train]
consist = "consists/birmingham_pullman.con"

[gameplay]
objective = "arrive"
difficulty = "normal"
penalty_per_second_late = 0.0

[simulation]
duration = 136.0
time_step = 1.0
seed = 42
legacy_power_cap = false
train_air_lap_hold = true
