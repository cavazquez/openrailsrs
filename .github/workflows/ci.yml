name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-cache

      - name: System libs (X11 + ALSA + Bevy)
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libasound2-dev libxkbcommon-dev libxkbcommon-x11-dev

      - name: Run check.sh
        run: chmod +x check.sh && ./check.sh

  visual-smoke:
    name: Visual smoke (#43)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-cache

      - name: System libs (X11 + ALSA + Bevy + xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libasound2-dev libxkbcommon-dev libxkbcommon-x11-dev xvfb

      - name: Visual regression smoke
        run: |
          chmod +x scripts/visual_regression_smoke.sh
          xvfb-run -a ./scripts/visual_regression_smoke.sh

      - name: Upload visual artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-smoke
          path: |
            tmp/visual_smoke/actual.png
            tmp/visual_smoke/diff.png
          if-no-files-found: warn

  coverage:
    name: Cobertura de tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-cache
          cache-directories: ~/.cargo/bin

      - name: System libs (X11 + ALSA + Bevy)
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libasound2-dev libxkbcommon-dev libxkbcommon-x11-dev

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generar LCOV
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
